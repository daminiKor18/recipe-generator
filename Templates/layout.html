<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, shrink-to-fit=no">

    <link rel="stylesheet" href="https://maxcdn.bootstrapcdn.com/bootstrap/4.0.0/css/bootstrap.min.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/5.15.3/css/all.min.css"/>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;700&family=Dancing+Script:wght@700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="{{ url_for('static',filename='css/style.css') }}">

    <title>Ingredi-Gen | Neural Recipe Engine</title>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>

    <style>
        /* Professional Glass Navbar */
        .navbar { 
            padding: 0.5rem 1rem; 
            transition: all 0.4s cubic-bezier(0.4, 0, 0.2, 1); 
            background: rgba(255, 255, 255, 0.98) !important;
            backdrop-filter: blur(15px);
            -webkit-backdrop-filter: blur(15px);
            border-bottom: 1px solid rgba(248, 165, 194, 0.1);
        }

        /* Top-Left Logo Styling */
        .navbar-brand img {
            height: 48px;
            width: auto;
            transition: transform 0.3s ease;
        }
        .navbar-brand:hover img {
            transform: scale(1.05);
        }
        
        .nav-link { 
            position: relative; 
            margin: 0 8px; 
            color: #636e72 !important; 
            transition: all 0.3s ease; 
            font-size: 0.85rem; 
            font-weight: 600;
        }
        
        .nav-link:hover, .nav-link.active { color: #f8a5c2 !important; }
        
        .nav-link::after {
            content: ''; 
            position: absolute; 
            width: 0; 
            height: 2px;
            bottom: -2px; 
            left: 50%; 
            background-color: #f8a5c2; 
            transition: 0.3s;
            transform: translateX(-50%);
        }
        .nav-link:hover::after, .nav-link.active::after { width: 80%; }
        
        .project-badge { 
            letter-spacing: 2px; 
            font-size: 0.65rem; 
            color: #f78fb3; 
            background: #fff0f3;
            padding: 8px 18px;
            border-radius: 50px;
            border: 1px solid rgba(248, 165, 194, 0.2);
            text-transform: uppercase;
            font-weight: 700;
        }

        .search-box { position: relative; display: flex; align-items: center; }
        .search-input {
            width: 0px; border: none; padding: 0; outline: none;
            transition: 0.4s ease; background: transparent;
            border-bottom: 2px solid #f8a5c2;
            font-size: 0.85rem; opacity: 0;
        }
        .search-box:hover .search-input, .search-input:focus { width: 120px; padding: 5px 10px; opacity: 1; }
        .search-icon-btn { background: none; border: none; color: #636e72; cursor: pointer; }

        .footer-link {
            color: #636e72;
            text-decoration: none;
            transition: 0.3s;
            font-size: 0.85rem;
        }
        .footer-link:hover { color: #f78fb3; text-decoration: none; }
        
        body { display: flex; flex-direction: column; min-height: 100vh; }
        main { flex: 1; }
        @media print { .no-print { display: none !important; } }
    </style>
</head>
<body>
    
    <nav class="navbar navbar-expand-lg navbar-light sticky-top shadow-sm no-print">
        <div class="container">
            <a class="navbar-brand" href="{{ url_for('home') }}">
                <img src="{{ url_for('static', filename='images/logo.png') }}" alt="Ingredi-Gen Logo">
            </a>

            <button class="navbar-toggler border-0" type="button" data-toggle="collapse" data-target="#navbarNavDropdown">
                <span class="navbar-toggler-icon"></span>
            </button>

            <div class="collapse navbar-collapse" id="navbarNavDropdown">
                <ul class="navbar-nav ml-auto">
                    <li class="nav-item">
                        <a class="nav-link" href="{{url_for('home')}}">Analyze</a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link" href="{{url_for('explore')}}">Explore</a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link" href="{{url_for('dashboard')}}">Dashboard</a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link" href="{{url_for('science')}}">Science</a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link" href="{{url_for('about')}}">Our Story</a>
                    </li>
                </ul>

                <div class="d-flex align-items-center ml-3">
                    <div class="search-box mr-3 d-none d-sm-block">
                        <input type="text" class="search-input" placeholder="Search...">
                        <button class="search-icon-btn"><i class="fas fa-search"></i></button>
                    </div>

                    <div class="project-badge">
                        <i class="fas fa-bolt mr-1"></i> Engine Active
                    </div>
                </div>
            </div>
        </div>
    </nav>
    
    <main>
        {% block content %}{% endblock %}
    </main>

    <footer class="footer mt-auto py-5 no-print" style="background: rgba(255,255,255,0.9); border-top: 1px solid rgba(248, 165, 194, 0.1);">
        <div class="container">
            <div class="row align-items-center">
                <div class="col-md-4 text-center text-md-left mb-4 mb-md-0">
                    <img src="{{ url_for('static', filename='images/logo.png') }}" alt="Ingredi-Gen" style="height: 35px; filter: grayscale(1) opacity(0.5);">
                    <p class="text-muted small mb-0 mt-2">© 2026 Ingredi-Gen Engine <br> Neural Culinary Intelligence</p>
                </div>

                <div class="col-md-4 text-center mb-4 mb-md-0">
                    <ul class="list-inline mb-0">
                        <li class="list-inline-item mx-2"><a href="{{ url_for('explore') }}" class="footer-link">Library</a></li>
                        <li class="list-inline-item mx-2"><a href="{{ url_for('science') }}" class="footer-link">Research</a></li>
                        <li class="list-inline-item mx-2"><a href="{{ url_for('dashboard') }}" class="footer-link">Dashboard</a></li>
                    </ul>
                </div>

                <div class="col-md-4 text-center text-md-right">
                    <div class="d-inline-block p-2 px-3 rounded-pill" style="background: #fff0f3;">
                        <small class="text-pink font-weight-bold text-uppercase" style="font-size: 0.65rem; letter-spacing: 1px;">
                            <i class="fas fa-microchip mr-1"></i> ResNet-50 v2 Stable
                        </small>
                    </div>
                </div>
            </div>
        </div>
    </footer>

    <script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/popper.js/1.12.9/umd/popper.min.js"></script>
    <script src="https://maxcdn.bootstrapcdn.com/bootstrap/4.0.0/js/bootstrap.min.js"></script>
    <script src="{{ url_for('static', filename='main.js') }}"></script>
</body>
</html>
